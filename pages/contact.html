<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBcar - Contato</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="../assets/img/logo.jpeg" alt="Logo BBcar">
        </div>
        <h1>Contato</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="../dashboard/index.html">Dashboard</a></li>
                <li><a href="../index.html">Home</a></li>
                <li><a href="about.html">Sobre Nós</a></li>
                <li><a href="../dashboard/register.html">Seja Parceiro</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Entre em Contato</h2>
            <form id="contact-form">
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Mensagem:</label>
                <textarea id="message" name="message" required></textarea>

                <button type="submit">Enviar</button>
            </form>
            <p id="contact-response"></p>
        </section>
    </main>
    <script>
        document.getElementById("contact-form").addEventListener("submit", function(event) {
            event.preventDefault();
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const message = document.getElementById("message").value;

            document.getElementById("contact-response").textContent = `Mensagem enviada com sucesso! Nome: ${name}, E-mail: ${email}, Mensagem: ${message}.`;
            document.getElementById("contact-form").reset();
        });
    </script>
</body>
</html>
