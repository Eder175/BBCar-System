<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Afiliados</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="../assets/img/logo.jpeg" alt="BBcar Logo">
        </div>
        <h1>Painel de Afiliados</h1>
        <nav>
            <ul>
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="visao-geral.html">Visão Geral</a></li>
                <li><a href="estatisticas.html">Estatísticas</a></li>
                <li><a href="configuracoes.html">Configurações</a></li>
                <li><a href="carrinho/index.html">Carrinho</a></li>
                <li><a href="../index.html">Voltar ao BBcar</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="affiliate-panel">
            <h2>Métricas de Afiliados</h2>
            <div class="metrics">
                <div class="metric-card">
                    <h3>Cliques</h3>
                    <p id="clicks">15</p>
                </div>
                <div class="metric-card">
                    <h3>Conversões</h3>
                    <p id="conversions">5</p>
                </div>
                <div class="metric-card">
                    <h3>Ganhos (€)</h3>
                    <p id="earnings">€ 1.500,00</p>
                </div>
            </div>
        </section>

        <section class="affiliate-tools">
            <h2>Seu Link de Afiliado</h2>
            <p>Compartilhe este link para promover a BBcar:</p>
            <a id="affiliate-link" href="#" target="_blank">Carregando...</a>
        </section>
    </main>
    <script src="affiliates.js"></script>
</body>
</html>
