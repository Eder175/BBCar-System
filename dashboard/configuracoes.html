<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBcar - Configurações</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="../assets/img/logo.jpeg" alt="BBcar Logo">
        </div>
        <h1>Configurações do Sistema</h1>
        <nav>
            <ul>
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="visao-geral.html">Visão Geral</a></li>
                <li><a href="estatisticas.html">Estatísticas</a></li>
                <li><a href="carrinho/index.html">Carrinho</a></li>
                <li><a href="affiliates.html">Painel de Parceiros</a></li>
                <li><a href="../index.html">Voltar ao BBcar</a></li>
            </ul>
        </nav>
    </header>

    <section class="settings">
        <h2>Preferências</h2>
        <form>
            <label for="currency">Moeda:</label>
            <select id="currency">
                <option value="euro" selected>Euro (€)</option>
                <option value="dollar">Dólar ($)</option>
            </select>
            <p>Modo escuro: <input type="checkbox" id="dark-mode"></p>
            <button type="submit">Salvar</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
