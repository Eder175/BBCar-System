<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBcar - Propostas de Veículos</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="futuristic-header">
        <div class="logo">
            <img src="../assets/img/logo.jpeg" alt="BBcar Logo">
        </div>
        <h1>Propostas de Veículos</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Dashboard</a></li>
                <li><a href="visao-geral.html">Visão Geral</a></li>
                <li><a href="estatisticas.html">Estatísticas</a></li>
                <li><a href="configuracoes.html">Configurações</a></li>
                <li><a href="propostas.html">Propostas</a></li>
                <li><a href="gerador-sites.html">Gerador de Sites</a></li>
                <li><a href="affiliates.html">Painel de Parceiros</a></li>
                <li><a href="../index.html">Voltar ao BBcar</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="propostas-list">
            <h2>Lista de Propostas de Veículos</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Ano</th>
                        <th>KM</th>
                        <th>Cor</th>
                        <th>IUC</th>
                        <th>IPO</th>
                        <th>Condição</th>
                        <th>Preço (€)</th>
                        <th>Foto</th>
                    </tr>
                </thead>
                <tbody id="propostas-table"></tbody>
            </table>
        </section>
    </main>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const propostasTable = document.getElementById("propostas-table");

            // Carrega as propostas do localStorage
            const cars = JSON.parse(localStorage.getItem("carsForSale")) || [];

            // Preenche a tabela com as propostas
            cars.forEach(car => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${car.id}</td>
                    <td>${car.marca}</td>
                    <td>${car.modelo}</td>
                    <td>${car.ano}</td>
                    <td>${car.km}</td>
                    <td>${car.cor}</td>
                    <td>${car.iuc}</td>
                    <td>${car.ipo}</td>
                    <td>${car.condicao}</td>
                    <td>€ ${car.preco}</td>
                    <td><img src="${car.image}" alt="Foto do Carro" style="width: 100px; border-radius: 5px;"></td>
                `;
                propostasTable.appendChild(row);
            });
        });
    </script>
</body>
</html>
