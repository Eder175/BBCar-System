<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBcar - Cadastro de Afiliados</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="../assets/img/logo.jpeg" alt="BBcar Logo">
        </div>
        <h1>Cadastro de Afiliados</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Dashboard</a></li>
                <li><a href="visao-geral.html">Visão Geral</a></li>
                <li><a href="estatisticas.html">Estatísticas</a></li>
                <li><a href="configuracoes.html">Configurações</a></li>
                <li><a href="affiliates.html">Painel de Parceiros</a></li>
                <li><a href="../index.html">Voltar ao BBcar</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Seja um Afiliado BBcar</h2>
            <form id="affiliate-form">
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Telefone:</label>
                <input type="text" id="phone" name="phone" required>

                <button type="submit">Cadastrar</button>
            </form>
            <p id="response-message"></p>
        </section>
    </main>
    <script>
        document.getElementById("affiliate-form").addEventListener("submit", function(event) {
            event.preventDefault();
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;

            const affiliateId = "AF-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            const affiliates = JSON.parse(localStorage.getItem("affiliates")) || [];
            affiliates.push({ id: affiliateId, name, email, phone, cliques: 0, conversoes: 0, ganhos: 0 });
            localStorage.setItem("affiliates", JSON.stringify(affiliates));

            document.getElementById("response-message").textContent = `Cadastro realizado com sucesso! Seu ID de Afiliado é: ${affiliateId}`;
            document.getElementById("affiliate-form").reset();
        });
    </script>
</body>
</html>
