<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Afiliados</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="../assets/img/logo.jpeg" alt="BBcar Logo">
        </div>
        <h1>Cadastre-se como Afiliado</h1>
        <nav>
            <ul>
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="visao-geral.html">Visão Geral</a></li>
                <li><a href="estatisticas.html">Estatísticas</a></li>
                <li><a href="configuracoes.html">Configurações</a></li>
                <li><a href="carrinho/index.html">Carrinho</a></li>
                <li><a href="affiliates.html">Painel de Parceiros</a></li>
                <li><a href="../index.html">Voltar ao BBcar</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Cadastre-se como Afiliado</h2>
            <form id="register-form">
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Telefone:</label>
                <input type="tel" id="phone" name="phone">

                <button type="submit">Cadastrar</button>
            </form>
            <p id="response-message"></p>
        </section>
    </main>
    <script>
        document.getElementById("register-form").addEventListener("submit", function(event) {
            event.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const idAfiliado = 'AF-' + Math.random().toString(36).substr(2, 9).toUpperCase(); // Gera um ID único com prefixo

            // Salva os dados no localStorage
            const afiliado = { id: idAfiliado, name, email, phone, clicks: 0, conversions: 0, earnings: 0 };
            let afiliados = JSON.parse(localStorage.getItem("afiliados")) || [];
            afiliados.push(afiliado);
            localStorage.setItem("afiliados", JSON.stringify(afiliados));

            // Exibe mensagem de sucesso
            const responseMessage = document.getElementById("response-message");
            responseMessage.textContent = `Cadastro realizado com sucesso! Seu ID de Afiliado é: ${idAfiliado}`;
            console.log(`Afiliado cadastrado: Nome: ${name}, Email: ${email}, Telefone: ${phone}, ID: ${idAfiliado}`);
        });
    </script>
</body>
</html>
